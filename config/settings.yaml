# Advanced Clevrr Computer - Configuration
# All settings for 100% local AI agent

ollama:
  url: "http://localhost:11434"
  vision_model: "llava:latest"
  text_model: "llama3:latest"
  code_model: "qwen2.5-coder:7b"
  timeout: 60
  max_retries: 3

voice:
  enabled: true
  wake_word: "hey clevrr"
  whisper_model: "tiny"
  whisper_language: "en"
  tts_rate: 200
  tts_volume: 1.0
  require_voice_auth: false
  auto_enroll_on_first_use: false
  auth_threshold: 0.82

screen:
  capture_interval: 1.0
  grid_size: 10
  multi_monitor: false
  screenshot_dir: "data/screenshots"
  max_screenshots: 50

memory:
  db_path: "data/memory.db"
  max_episodes: 1000
  similarity_threshold: 0.75
  cleanup_days: 30

agent:
  max_retries: 3
  step_timeout: 30
  heal_attempts: 3
  confidence_threshold: 0.7

ui:
  port: 7860
  theme: "dark"
  refresh_interval: 1
