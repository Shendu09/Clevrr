; Clevrr Service Configuration

[service]
name = clevrr
display_name = Clevrr AI OS Layer
description = Local AI layer for OS automation
data_dir = ./clevrr_data
log_dir = ./clevrr_logs
log_level = INFO

[health]
interval = 30
max_memory_mb = 512
max_cpu_percent = 80.0
auto_restart = true
restart_delay = 5

[ipc]
socket_path = /tmp/clevrr.sock
pipe_name = \\.\pipe\clevrr
